<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Roots &amp; Powers Visualiser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-red:#b23b3b;
    --ink-blue:#2f6f9f;
    --ink-green:#3f8f5f;
    --ink-purple:#7a4f9f;
    --ink-orange:#c2762b;
    --ink-teal:#1f7a72;
    --ink-magenta:#9c3f6b;
    --paper-cream:#f3ecd8;
    --paper-line:#c9bfa0;
    --graphite:#2b2b2e;
    --graphite-dark:#1d1d20;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--graphite-dark);
    font-family:'Patrick Hand', cursive;
    color:#eae4d2;
    overflow:hidden;
  }
  .app{
    display:flex;
    height:100vh;
    width:100vw;
  }

  /* ---------- LEFT MENU ---------- */
  .menu{
    width:300px;
    min-width:230px;
    background:var(--graphite);
    border-right:3px solid #000;
    padding:18px 16px;
    display:flex;
    flex-direction:column;
    gap:14px;
    overflow-y:auto;
  }
  .menu h1{
    font-family:'Caveat', cursive;
    font-size:30px;
    margin:0 0 2px 0;
    color:#fff;
    line-height:1.1;
  }
  .menu .subtitle{
    font-size:16px;
    color:#b9b3a0;
    margin:0 0 6px 0;
  }
  .panel{
    background:var(--paper-cream);
    background-image:
      repeating-linear-gradient(to bottom, transparent 0 27px, rgba(120,110,80,0.18) 27px 28px);
    color:#2b2b2e;
    border-radius:10px;
    padding:12px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.35), inset 0 0 0 2px rgba(0,0,0,0.06);
  }
  .panel h2{
    font-family:'Caveat', cursive;
    font-size:22px;
    margin:0 0 8px 0;
    border-bottom:2px dashed var(--paper-line);
    padding-bottom:4px;
  }
  .choice-btn{
    width:100%;
    min-height:52px;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:10px;
    background:#fffdf6;
    border:2px solid #2b2b2e;
    border-radius:8px;
    font-family:'Patrick Hand', cursive;
    font-size:20px;
    color:#2b2b2e;
    padding:8px 12px;
    margin-bottom:8px;
    cursor:pointer;
    transition:transform 0.08s ease, box-shadow 0.08s ease;
    box-shadow:0 2px 0 rgba(0,0,0,0.5);
  }
  .choice-btn:last-child{margin-bottom:0;}
  .choice-btn:active{ transform:translateY(2px); box-shadow:0 0 0 rgba(0,0,0,0.5); }
  .choice-btn .swatch{
    width:16px; height:16px; border-radius:50%;
    border:2px solid #2b2b2e;
    flex-shrink:0;
  }
  .choice-btn .exp{
    font-family:'Caveat', cursive;
    font-size:24px;
    font-weight:700;
  }
  .choice-btn .exp sup,
  .selected-item .lbl sup{
    font-size:0.6em;
    vertical-align:super;
    line-height:0;
  }
  .clear-btn{
    width:100%;
    min-height:48px;
    background:#3a2323;
    border:2px solid #000;
    color:#f0d9d9;
    border-radius:8px;
    font-family:'Patrick Hand', cursive;
    font-size:18px;
    cursor:pointer;
    margin-top:4px;
  }
  .clear-btn:active{ transform:translateY(1px); }

  .quarter-toggle{
    display:flex;
    gap:6px;
    margin-top:10px;
  }
  .quarter-btn{
    flex:1;
    min-height:46px;
    background:#fffdf6;
    border:2px solid #2b2b2e;
    border-radius:8px;
    font-family:'Patrick Hand', cursive;
    font-size:16px;
    color:#2b2b2e;
    cursor:pointer;
    box-shadow:0 2px 0 rgba(0,0,0,0.5);
  }
  .quarter-btn:active{ transform:translateY(2px); box-shadow:0 0 0 rgba(0,0,0,0.5); }
  .quarter-btn.active{
    background:#2b2b2e;
    color:#f3ecd8;
    box-shadow:inset 0 0 0 2px #8a7f5f;
  }

  .selected-list{ display:flex; flex-direction:column; gap:8px; }
  .selected-item{
    display:flex; align-items:center; gap:8px;
    background:#fffdf6;
    border:2px solid #2b2b2e;
    border-radius:8px;
    padding:6px 10px;
    font-size:18px;
  }
  .selected-item .swatch{ width:14px; height:14px; border-radius:50%; border:2px solid #2b2b2e; flex-shrink:0;}
  .selected-item .lbl{ flex:1; }
  .selected-item .remove{
    background:none; border:none; color:#7a2020; font-size:20px;
    cursor:pointer; font-family:'Patrick Hand', cursive; line-height:1;
    padding:2px 6px;
  }

  .empty-note{
    font-size:16px;
    color:#6b6555;
    text-align:center;
    padding:8px 4px;
  }

  /* ---------- GRAPH AREA ---------- */
  .graph-wrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    background:
      radial-gradient(ellipse at 50% 0%, #2a2a2e 0%, var(--graphite-dark) 70%);
  }
  .graph-frame{
    width:100%;
    height:100%;
    background:#fffde7;
    border-radius:14px;
    box-shadow: 0 8px 0 rgba(0,0,0,0.5), 0 0 0 4px #000;
    padding:14px;
  }
  svg{ width:100%; height:100%; display:block; }
  .grid-fine{ stroke:#c9bfa0; stroke-width:1; opacity:0.5; }
  .grid-major{ stroke:#a89a70; stroke-width:1.4; opacity:0.8; }
  .axis-line{ stroke:#2b2b2e; stroke-width:2.5; }
  .tick-label{
    font-family:Arial, Helvetica, sans-serif;
    font-weight:700;
    font-size:14px;
    fill:#3a3a3a;
  }
  .axis-title{
    font-family:Arial, Helvetica, sans-serif;
    font-weight:700;
    font-size:22px;
    fill:#2b2b2e;
  }
  .curve{
    fill:none;
    stroke-width:3.2;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .curve-label{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:22px;
  }
  .curve-label-bg{
    fill:#fffde7;
    opacity:0.85;
  }

  .curve-tooltip{
    position:fixed;
    display:none;
    pointer-events:none;
    background:var(--paper-cream);
    border:2.5px solid #2b2b2e;
    border-radius:8px;
    padding:6px 12px;
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:22px;
    box-shadow:0 3px 0 rgba(0,0,0,0.4);
    z-index:1000;
    white-space:nowrap;
  }
  .curve-tooltip sup{
    font-size:0.62em;
    vertical-align:super;
    line-height:0;
  }

  @media (max-width: 820px){
    .app{ flex-direction:column; }
    .menu{ width:100%; max-height:42vh; border-right:none; border-bottom:3px solid #000; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="menu" id="menu">
    <div>
      <h1>Roots &amp; Powers</h1>
      <p class="subtitle">Pick a curve to plot on the graph</p>
    </div>

    <div class="panel" id="choicePanel">
      <h2 id="choiceHeading">Choose a curve</h2>
      <div id="choiceButtons"></div>
    </div>

    <div class="panel">
      <h2>On the graph</h2>
      <div class="selected-list" id="selectedList">
        <p class="empty-note">Nothing plotted yet</p>
      </div>
      <button class="clear-btn" id="clearBtn" style="display:none;">Clear graph</button>
      <button class="clear-btn" id="scaleBtn" style="display:none; background:#233a3a; color:#d9f0ea;">Scale to image</button>
      <div class="quarter-toggle" id="quarterToggle">
        <button class="quarter-btn active" id="btn4Quarter" data-mode="4">4 Quarter</button>
        <button class="quarter-btn" id="btn1Quarter" data-mode="1">1 Quarter</button>
      </div>
      <button class="clear-btn" id="zeroFocusBtn" style="display:none; background:#3a2f1a; color:#f0dfb8; margin-top:8px;">Zero focus</button>
    </div>
  </div>

  <div class="graph-wrap">
    <div class="graph-frame">
      <svg id="chart" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="curve-tooltip" id="curveTooltip"></div>
  </div>
</div>

<script>
(function(){

  // ---------- Data model ----------
  const OPTIONS = [
    { id:'x4',    exp:'x⁴',                 full:'y = x⁴',              color:'var(--ink-orange)',   hex:'#c2762b', fn: x => Math.pow(x,4) },
    { id:'x3',    exp:'x³',                 full:'y = x³',              color:'var(--ink-blue)',     hex:'#2f6f9f', fn: x => x*x*x },
    { id:'x5_2',  exp:'x<sup>5/2</sup>',    full:'y = x<sup>5/2</sup>', supBase:'y = x', supText:'5/2', color:'var(--ink-purple)',   hex:'#7a4f9f', fn: x => x < 0 ? NaN : Math.pow(x, 2.5) },
    { id:'x2',    exp:'x²',                 full:'y = x²',              color:'var(--ink-red)',      hex:'#b23b3b', fn: x => x*x },
    { id:'x3_2',  exp:'x<sup>3/2</sup>',    full:'y = x<sup>3/2</sup>', supBase:'y = x', supText:'3/2', color:'var(--ink-magenta)',  hex:'#9c3f6b', fn: x => x < 0 ? NaN : Math.pow(x, 1.5) },
    { id:'x1',    exp:'x',                  full:'y = x',               color:'var(--ink-teal)',     hex:'#1f7a72', fn: x => x },
    { id:'x1_2',  exp:'x<sup>1/2</sup>',    full:'y = x<sup>1/2</sup>', supBase:'y = x', supText:'1/2', color:'var(--ink-green)',    hex:'#3f8f5f', fn: x => x < 0 ? NaN : Math.sqrt(x) },
  ];

  const DEFAULT_XMIN = -20,  DEFAULT_XMAX = 20;
  const DEFAULT_YMIN = -200, DEFAULT_YMAX = 200;
  let XMIN = DEFAULT_XMIN, XMAX = DEFAULT_XMAX;
  let YMIN = DEFAULT_YMIN, YMAX = DEFAULT_YMAX;

  // SVG plot area (within the 1000x620 viewBox)
  const MARGIN = { top: 30, right: 30, bottom: 60, left: 66 };
  const PLOT_W = 1000 - MARGIN.left - MARGIN.right;
  const PLOT_H = 620 - MARGIN.top - MARGIN.bottom;

  function toSvgX(x){ return MARGIN.left + (x - XMIN) / (XMAX - XMIN) * PLOT_W; }
  function toSvgY(y){ return MARGIN.top + (YMAX - y) / (YMAX - YMIN) * PLOT_H; }

  let selected = []; // array of option objects, in order chosen

  const svg = document.getElementById('chart');
  const curveTooltip = document.getElementById('curveTooltip');
  const choiceButtons = document.getElementById('choiceButtons');
  const choiceHeading = document.getElementById('choiceHeading');
  const choicePanel = document.getElementById('choicePanel');
  const selectedList = document.getElementById('selectedList');
  const clearBtn = document.getElementById('clearBtn');
  const scaleBtn = document.getElementById('scaleBtn');
  const zeroFocusBtn = document.getElementById('zeroFocusBtn');
  const btn4Quarter = document.getElementById('btn4Quarter');
  const btn1Quarter = document.getElementById('btn1Quarter');
  let quarterMode = '4'; // '4' = all four quadrants, '1' = positive values only

  // ---------- Sampling & clipping ----------
  function sample(fn){
    const pts = [];
    const N = 2000;
    for (let i = 0; i <= N; i++){
      const x = XMIN + (i / N) * (XMAX - XMIN);
      pts.push({ x, y: fn(x) });
    }
    return pts;
  }

  function inRange(y){ return !isNaN(y) && y >= YMIN && y <= YMAX; }

  function buildSegments(pts){
    const segments = [];
    let current = [];
    for (let i = 0; i < pts.length; i++){
      const p = pts[i];
      const prev = pts[i-1];
      if (inRange(p.y)){
        if (prev && !isNaN(prev.y) && !inRange(prev.y)){
          const boundaryY = prev.y > YMAX ? YMAX : YMIN;
          const t = (boundaryY - prev.y) / (p.y - prev.y);
          const bx = prev.x + t * (p.x - prev.x);
          current.push({ x: bx, y: boundaryY });
        }
        current.push(p);
      } else {
        if (current.length){
          if (prev && inRange(prev.y) && !isNaN(p.y)){
            const boundaryY = p.y > YMAX ? YMAX : YMIN;
            const t = (boundaryY - prev.y) / (p.y - prev.y);
            const bx = prev.x + t * (p.x - prev.x);
            current.push({ x: bx, y: boundaryY });
          }
          segments.push(current);
          current = [];
        }
      }
    }
    if (current.length) segments.push(current);
    return segments;
  }

  function segmentsToPathD(segments){
    return segments.map(seg => {
      return seg.map((p,i) => (i===0 ? 'M' : 'L') + toSvgX(p.x).toFixed(2) + ',' + toSvgY(p.y).toFixed(2)).join(' ');
    }).join(' ');
  }

  // ---------- Drawing the grid & axes (recomputed whenever the range changes) ----------
  function niceStep(range, targetTicks){
    const raw = range / targetTicks;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    let step;
    if (norm < 1.5) step = 1;
    else if (norm < 3) step = 2;
    else if (norm < 7) step = 5;
    else step = 10;
    return step * mag;
  }

  function fmtTick(v, step){
    const decimals = step < 1 ? Math.min(4, Math.ceil(-Math.log10(step))) : 0;
    const rounded = parseFloat(v.toFixed(decimals + 2));
    return decimals > 0 ? rounded.toFixed(decimals) : String(Math.round(rounded));
  }

  function drawGrid(){
    let g = '';
    const stepX = niceStep(XMAX - XMIN, 10);
    const stepY = niceStep(YMAX - YMIN, 10);
    const fineStepX = stepX / 5;
    const fineStepY = stepY / 5;
    const EPS = 1e-6;

    // fine squared-paper grid
    for (let x = Math.ceil(XMIN / fineStepX) * fineStepX; x <= XMAX + EPS; x += fineStepX){
      if (Math.abs(Math.round(x / stepX) * stepX - x) < EPS) continue;
      const sx = toSvgX(x);
      g += `<line class="grid-fine" x1="${sx}" y1="${MARGIN.top}" x2="${sx}" y2="${MARGIN.top+PLOT_H}"/>`;
    }
    for (let y = Math.ceil(YMIN / fineStepY) * fineStepY; y <= YMAX + EPS; y += fineStepY){
      if (Math.abs(Math.round(y / stepY) * stepY - y) < EPS) continue;
      const sy = toSvgY(y);
      g += `<line class="grid-fine" x1="${MARGIN.left}" y1="${sy}" x2="${MARGIN.left+PLOT_W}" y2="${sy}"/>`;
    }
    // major gridlines + tick labels
    let ticksX = '';
    for (let x = Math.ceil(XMIN / stepX) * stepX; x <= XMAX + EPS; x += stepX){
      const sx = toSvgX(x);
      g += `<line class="grid-major" x1="${sx}" y1="${MARGIN.top}" x2="${sx}" y2="${MARGIN.top+PLOT_H}"/>`;
      ticksX += `<text class="tick-label" x="${sx}" y="${MARGIN.top+PLOT_H+20}" text-anchor="middle">${fmtTick(x, stepX)}</text>`;
    }
    let ticksY = '';
    for (let y = Math.ceil(YMIN / stepY) * stepY; y <= YMAX + EPS; y += stepY){
      const sy = toSvgY(y);
      g += `<line class="grid-major" x1="${MARGIN.left}" y1="${sy}" x2="${MARGIN.left+PLOT_W}" y2="${sy}"/>`;
      ticksY += `<text class="tick-label" x="${MARGIN.left-10}" y="${sy+4}" text-anchor="end">${fmtTick(y, stepY)}</text>`;
    }
    // axes themselves (x=0, y=0)
    const zeroX = toSvgX(0), zeroY = toSvgY(0);
    g += `<line class="axis-line" x1="${MARGIN.left}" y1="${zeroY}" x2="${MARGIN.left+PLOT_W}" y2="${zeroY}"/>`;
    g += `<line class="axis-line" x1="${zeroX}" y1="${MARGIN.top}" x2="${zeroX}" y2="${MARGIN.top+PLOT_H}"/>`;
    // border box
    g += `<rect x="${MARGIN.left}" y="${MARGIN.top}" width="${PLOT_W}" height="${PLOT_H}" fill="none" stroke="#2b2b2e" stroke-width="2"/>`;

    const titleX = `<text class="axis-title" x="${MARGIN.left+PLOT_W/2}" y="${MARGIN.top+PLOT_H+48}" text-anchor="middle">Base number (x)</text>`;
    const titleY = `<text class="axis-title" x="${18}" y="${MARGIN.top+PLOT_H/2}" text-anchor="middle" transform="rotate(-90 18,${MARGIN.top+PLOT_H/2})">Root / power result (y)</text>`;

    return g + ticksX + ticksY + titleX + titleY;
  }

  // ---------- Rendering curves ----------
  function renderCurves(){
    // grid is redrawn fresh each pass since axis ranges can change (Scale to image)
    svg.innerHTML = drawGrid();

    selected.forEach(opt => {
      const pts = sample(opt.fn);
      const segments = buildSegments(pts);
      if (segments.length === 0) return;
      const d = segmentsToPathD(segments);
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', d);
      path.setAttribute('class','curve');
      path.setAttribute('stroke', opt.hex);
      svg.appendChild(path);

      // wider, invisible path on top purely for easier hover/tooltip hit-testing
      const hitPath = document.createElementNS('http://www.w3.org/2000/svg','path');
      hitPath.setAttribute('d', d);
      hitPath.setAttribute('fill', 'none');
      hitPath.setAttribute('stroke', 'transparent');
      hitPath.setAttribute('stroke-width', '18');
      hitPath.style.pointerEvents = 'stroke';
      hitPath.style.cursor = 'pointer';
      hitPath.addEventListener('mouseenter', () => {
        curveTooltip.innerHTML = opt.full;
        curveTooltip.style.borderColor = opt.hex;
        curveTooltip.style.color = opt.hex;
        curveTooltip.style.display = 'block';
        path.setAttribute('stroke-width', '5');
      });
      hitPath.addEventListener('mousemove', (e) => {
        curveTooltip.style.left = (e.clientX + 16) + 'px';
        curveTooltip.style.top = (e.clientY + 16) + 'px';
      });
      hitPath.addEventListener('mouseleave', () => {
        curveTooltip.style.display = 'none';
        path.setAttribute('stroke-width', '3.2');
      });
      svg.appendChild(hitPath);

      // label: place near the rightmost point of the longest visible segment
      let longest = segments[0];
      segments.forEach(s => { if (s.length > longest.length) longest = s; });
      const labelPt = longest[longest.length - 1];
      const lx = toSvgX(labelPt.x);
      const ly = toSvgY(labelPt.y);
      // keep label inside plot bounds
      const clampedLx = Math.min(Math.max(lx, MARGIN.left + 40), MARGIN.left + PLOT_W - 10);
      const clampedLy = Math.min(Math.max(ly - 12, MARGIN.top + 14), MARGIN.top + PLOT_H - 8);

      const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      const textEl = document.createElementNS('http://www.w3.org/2000/svg','text');
      textEl.setAttribute('class','curve-label');
      textEl.setAttribute('x', clampedLx);
      textEl.setAttribute('y', clampedLy);
      textEl.setAttribute('fill', opt.hex);
      textEl.setAttribute('text-anchor','end');
      if (opt.supText){
        const baseSpan = document.createElementNS('http://www.w3.org/2000/svg','tspan');
        baseSpan.textContent = opt.supBase;
        textEl.appendChild(baseSpan);
        const supSpan = document.createElementNS('http://www.w3.org/2000/svg','tspan');
        supSpan.textContent = opt.supText;
        supSpan.setAttribute('font-size','0.62em');
        supSpan.setAttribute('dy','-8');
        textEl.appendChild(supSpan);
      } else {
        textEl.textContent = opt.full;
      }
      svg.appendChild(textEl);
      // approximate bg box after measuring
      requestAnimationFrame(() => {
        try{
          const bbox = textEl.getBBox();
          bg.setAttribute('class','curve-label-bg');
          bg.setAttribute('x', bbox.x - 4);
          bg.setAttribute('y', bbox.y - 2);
          bg.setAttribute('width', bbox.width + 8);
          bg.setAttribute('height', bbox.height + 4);
          bg.setAttribute('rx', 4);
          svg.insertBefore(bg, textEl);
        }catch(e){}
      });
    });
  }

  // ---------- Menu rendering ----------
  function renderMenu(){
    const remaining = OPTIONS.filter(o => !selected.find(s => s.id === o.id));

    if (remaining.length === 0){
      choicePanel.style.display = 'none';
    } else {
      choicePanel.style.display = '';
      choiceHeading.textContent = selected.length === 0 ? 'Choose a curve' : 'Choose another curve';
      choiceButtons.innerHTML = '';
      remaining.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="swatch" style="background:${opt.hex}"></span><span class="exp">${opt.exp}</span>`;
        btn.addEventListener('click', () => {
          selected.push(opt);
          renderAll();
        });
        choiceButtons.appendChild(btn);
      });
    }

    // selected list
    if (selected.length === 0){
      selectedList.innerHTML = '<p class="empty-note">Nothing plotted yet</p>';
      clearBtn.style.display = 'none';
      scaleBtn.style.display = 'none';
      zeroFocusBtn.style.display = 'none';
    } else {
      selectedList.innerHTML = '';
      selected.forEach(opt => {
        const row = document.createElement('div');
        row.className = 'selected-item';
        row.innerHTML = `<span class="swatch" style="background:${opt.hex}"></span><span class="lbl">${opt.full}</span>`;
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove';
        removeBtn.textContent = '×';
        removeBtn.addEventListener('click', () => {
          selected = selected.filter(s => s.id !== opt.id);
          renderAll();
        });
        row.appendChild(removeBtn);
        selectedList.appendChild(row);
      });
      clearBtn.style.display = '';
      scaleBtn.style.display = '';
      zeroFocusBtn.style.display = '';
    }
  }

  function renderAll(){
    renderMenu();
    renderCurves();
  }

  function updateQuarterButtons(){
    btn4Quarter.classList.toggle('active', quarterMode === '4');
    btn1Quarter.classList.toggle('active', quarterMode === '1');
  }

  function setQuarterMode(mode){
    quarterMode = mode;
    if (quarterMode === '1'){
      XMIN = 0;
      YMIN = 0;
    } else {
      XMIN = -XMAX;
      YMIN = -YMAX;
    }
    updateQuarterButtons();
    renderAll();
  }

  btn4Quarter.addEventListener('click', () => setQuarterMode('4'));
  btn1Quarter.addEventListener('click', () => setQuarterMode('1'));

  clearBtn.addEventListener('click', () => {
    selected = [];
    XMIN = DEFAULT_XMIN; XMAX = DEFAULT_XMAX;
    YMIN = DEFAULT_YMIN; YMAX = DEFAULT_YMAX;
    quarterMode = '4';
    updateQuarterButtons();
    renderAll();
  });

  scaleBtn.addEventListener('click', () => {
    if (selected.length === 0) return;
    XMIN = -10; XMAX = 10;

    let minY = Infinity, maxY = -Infinity;
    const N = 1000;
    selected.forEach(opt => {
      for (let i = 0; i <= N; i++){
        const x = XMIN + (i / N) * (XMAX - XMIN);
        const y = opt.fn(x);
        if (!isNaN(y) && isFinite(y)){
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    });

    if (!isFinite(minY) || !isFinite(maxY)){
      minY = -10; maxY = 10;
    }
    if (minY === maxY){
      minY -= 1; maxY += 1;
    }
    const pad = (maxY - minY) * 0.1;
    YMIN = minY - pad;
    YMAX = maxY + pad;

    if (quarterMode === '1'){
      XMIN = 0;
      YMIN = 0;
    }

    renderAll();
  });

  zeroFocusBtn.addEventListener('click', () => {
    if (selected.length === 0) return;
    XMIN = -0.2; XMAX = 1.2;

    let minY = Infinity, maxY = -Infinity;
    const N = 1000;
    selected.forEach(opt => {
      for (let i = 0; i <= N; i++){
        const x = XMIN + (i / N) * (XMAX - XMIN);
        const y = opt.fn(x);
        if (!isNaN(y) && isFinite(y)){
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    });

    if (!isFinite(minY) || !isFinite(maxY)){
      minY = -1.2; maxY = 1.2;
    }
    if (minY === maxY){
      minY -= 1; maxY += 1;
    }
    const pad = (maxY - minY) * 0.1;
    YMIN = minY - pad;
    YMAX = maxY + pad;

    renderAll();
  });

  renderAll();

})();
</script>
</body>
