<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Averages Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{font-family:system-ui,sans-serif;background:#2b2b2b;color:#c8c8c8;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.75rem 1rem;overflow:hidden}
h1{font-size:1.3rem;font-weight:600;text-align:center;color:#c8c8c8;margin-bottom:0.1rem}
.subtitle{font-size:0.85rem;color:#c8c8c8;text-align:center;margin-bottom:0.6rem}

/* top area — flask + columns + range panel, all in a row */
#top{position:relative;display:flex;gap:0.9rem;align-items:flex-end;justify-content:center;margin-bottom:0.6rem}

#flask-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;touch-action:none;justify-content:flex-end}
#flask-label{font-size:11px;color:#c8c8c8;text-align:center;line-height:1.3;margin-bottom:4px}
#flask{width:56px;height:200px;flex-shrink:0;touch-action:none}
#flask svg{width:100%;height:100%;touch-action:none}
#flask-val{font-size:13px;font-weight:600;min-height:16px;text-align:center;color:#c8c8c8}

#stage-wrap{position:relative;display:flex;align-items:flex-end;gap:0}
#cols-stage{position:relative;display:flex;align-items:flex-end;touch-action:none;flex-shrink:0}
.col-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;position:absolute;bottom:0;transition:left 1.1s cubic-bezier(0.4,0,0.2,1)}
.col-label{font-size:12px;color:#c8c8c8;font-weight:500}
.col-track{border:1.5px solid #555;border-radius:6px;position:relative;overflow:hidden;background:#3a3a3a;touch-action:none;cursor:crosshair}
.col-fill{position:absolute;bottom:0;left:0;right:0;transition:height 0.35s ease}
.col-num{font-size:12px;font-weight:600;min-height:16px;color:#c8c8c8;text-align:center}

/* range panel */
#range-panel{position:relative;flex-shrink:0;width:80px;opacity:0;transition:opacity 0.3s ease}
#range-line-high{position:absolute;left:0;right:0;height:2px;background:#d63384;transform:scaleX(0);transform-origin:left;transition:transform 0.6s ease}
#range-line-low{position:absolute;left:0;right:0;height:2px;background:#d63384;transform:scaleX(0);transform-origin:left;transition:transform 0.6s ease 0.2s}
#range-box{position:absolute;right:0;width:70px;border-radius:8px;background:#d63384;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;opacity:0;transition:opacity 0.5s ease 0.7s}
#range-box .range-label{font-size:11px;color:#fff;font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
#range-box .range-val{font-size:1.4rem;font-weight:700;color:#fff}

/* copy overlay — covers the entire #top div */
#copy-overlay{display:none;position:absolute;inset:0;background:#2b2b2b;border-radius:10px;align-items:center;justify-content:center;z-index:20;opacity:0;transition:opacity 0.4s ease}
#copy-overlay.visible{display:flex;opacity:1}
#copy-grid{display:flex;gap:12px;align-items:center;justify-content:center;flex-wrap:wrap;padding:1rem}
.copy-cell{display:flex;flex-direction:column;align-items:center;gap:4px}
.copy-cell-label{font-size:13px;color:#888;font-weight:500}
.copy-cell-val{font-size:3rem;font-weight:700;color:#f5c431;line-height:1}

/* buttons */
#btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:0.4rem}
#btns button{padding:12px 24px;font-size:16px;font-weight:500;border-radius:10px;border:1.5px solid #555;background:#3a3a3a;color:#c8c8c8;cursor:pointer;transition:background 0.15s;min-width:100px}
#btns button:active{background:#505050}
#btn-random{border-color:#777}
#btn-mode{border-color:#d4a017;color:#f5c431}
#btn-median{border-color:#2d7dd2;color:#7ec4f8}
#btn-mean{border-color:#2a8f57;color:#5dd68a}
#btns2{display:flex;gap:10px;justify-content:center;margin-bottom:0.4rem}
#btn-range{padding:10px 28px;font-size:15px;font-weight:500;border-radius:10px;border:1.5px solid #9b3060;background:#3a3a3a;color:#e07aaa;cursor:pointer;transition:background 0.15s}
#btn-range:active{background:#505050}
#btn-copy{padding:10px 28px;font-size:15px;font-weight:500;border-radius:10px;border:1.5px solid #5a7a9b;background:#3a3a3a;color:#7ec4f8;cursor:pointer;transition:background 0.15s}
#btn-copy:active{background:#505050}
#info{min-height:24px;text-align:center;font-size:13px;color:#c8c8c8;max-width:700px}
</style>
</head>
<body>

<h1>Averages Explorer</h1>
<p class="subtitle">Mode &nbsp;·&nbsp; Median &nbsp;·&nbsp; Mean</p>

<div id="top">
  <div id="flask-wrap">
    <div id="flask-label">Drag to set<br>a level</div>
    <div id="flask">
      <svg viewBox="0 0 64 240" xmlns="http://www.w3.org/2000/svg" id="flask-svg">
        <defs><clipPath id="fc">
          <path d="M20,10 L20,140 L4,220 Q2,236 14,238 L50,238 Q62,236 60,220 L44,140 L44,10 Z"/>
        </clipPath></defs>
        <rect id="flask-liquid" x="0" y="240" width="64" height="0" fill="#f5c431" clip-path="url(#fc)"/>
        <path d="M20,10 L20,140 L4,220 Q2,236 14,238 L50,238 Q62,236 60,220 L44,140 L44,10 Z" fill="none" stroke="#c49a10" stroke-width="2.5"/>
        <rect x="16" y="4" width="32" height="12" rx="4" fill="#c49a10"/>
        <text x="32" y="165" text-anchor="middle" font-size="26" fill="#a07800">&#9879;</text>
      </svg>
    </div>
    <div id="flask-val">–</div>
  </div>

  <div id="stage-wrap">
    <div id="cols-stage"></div>
    <div id="range-panel">
      <div id="range-line-high"></div>
      <div id="range-line-low"></div>
      <div id="range-box">
        <span class="range-label">Range</span>
        <span class="range-val" id="range-val-text">0</span>
      </div>
    </div>
  </div>

  <!-- overlay covers entire #top -->
  <div id="copy-overlay">
    <div id="copy-grid"></div>
  </div>
</div>

<div id="btns">
  <button id="btn-random">&#8635; Random</button>
  <button id="btn-mode">Mode</button>
  <button id="btn-median">Median</button>
  <button id="btn-mean">Mean</button>
</div>
<div id="btns2">
  <button id="btn-range">Range (not an average)</button>
  <button id="btn-copy">Copy Values</button>
</div>
<div id="info"></div>

<script>
const COLS=9, MAX=12;
const YELLOW='#f5c431';
const MODE_COLOURS=['#f5c431','#e05a9a','#4ac97e','#c77dff','#ff7c43'];
const labels=['a','b','c','d','e','f','g','h','i'];

let vals=Array(COLS).fill(0);
let origOrder=Array.from({length:COLS},(_,i)=>i);
let activeBtn=null, activeRange=false, copyVisible=false;
let flaskLevel=0, colDragIdx=null, flaskActive=false;

const stage         = document.getElementById('cols-stage');
const info          = document.getElementById('info');
const flaskSvg      = document.getElementById('flask-svg');
const flaskLiq      = document.getElementById('flask-liquid');
const rangePanel    = document.getElementById('range-panel');
const rangeLineHigh = document.getElementById('range-line-high');
const rangeLineLow  = document.getElementById('range-line-low');
const rangeBox      = document.getElementById('range-box');
const rangeValText  = document.getElementById('range-val-text');
const copyOverlay   = document.getElementById('copy-overlay');
const copyGrid      = document.getElementById('copy-grid');

// ── sizing ──────────────────────────────────────────────────────────────────
function calcSizes(){
  const stageW = window.innerWidth - 56 - 32 - 24 - 90;
  const colW   = Math.floor((stageW - 8*(COLS-1)) / COLS);
  const GAP    = colW + 8;
  const trackH = Math.min(200, window.innerHeight*0.42);
  return {colW, GAP, trackH};
}
let {colW, GAP, trackH} = calcSizes();
function colH(v){ return (v/MAX)*trackH; }

// ── build columns ───────────────────────────────────────────────────────────
function buildCols(){
  ({colW, GAP, trackH} = calcSizes());
  stage.style.width  = (COLS*GAP-8)+'px';
  stage.style.height = (trackH+30)+'px';
  rangePanel.style.height = (trackH+30)+'px';
  stage.innerHTML='';

  origOrder.forEach((origIdx,pos)=>{
    const wrap=document.createElement('div');
    wrap.className='col-wrap';
    wrap.id='wrap-'+origIdx;
    wrap.style.cssText='left:'+(pos*GAP)+'px;width:'+colW+'px;transition:none';

    const lbl=document.createElement('div');
    lbl.className='col-label';
    lbl.textContent=labels[origIdx];

    const track=document.createElement('div');
    track.className='col-track';
    track.style.cssText='width:'+colW+'px;height:'+trackH+'px';
    track.dataset.colidx=origIdx;

    const fill=document.createElement('div');
    fill.className='col-fill';
    fill.id='fill-'+origIdx;
    fill.style.cssText='background:'+YELLOW+';opacity:1;height:'+colH(vals[origIdx])+'px';
    track.appendChild(fill);

    const num=document.createElement('div');
    num.className='col-num';
    num.id='num-'+origIdx;
    num.textContent=vals[origIdx];

    wrap.appendChild(lbl); wrap.appendChild(track); wrap.appendChild(num);
    stage.appendChild(wrap);

    track.addEventListener('touchstart',e=>{e.preventDefault();handleColTouch(e,track,origIdx);},{passive:false});
    track.addEventListener('touchmove', e=>{e.preventDefault();handleColTouch(e,track,origIdx);},{passive:false});
    track.addEventListener('mousedown', e=>handleColMouse(e,track,origIdx));
    track.addEventListener('mousemove', e=>{if(colDragIdx===origIdx)handleColMouse(e,track,origIdx);});
  });
}

// ── column interaction ──────────────────────────────────────────────────────
function valFromY(clientY,rect){
  return Math.max(0,Math.min(MAX,Math.round(MAX*(1-(clientY-rect.top)/rect.height))));
}
function setColVal(idx,v){
  vals[idx]=v;
  const f=document.getElementById('fill-'+idx);
  const n=document.getElementById('num-'+idx);
  if(f){ f.style.height=colH(v)+'px'; if(!activeBtn&&!activeRange) f.style.cssText='background:'+YELLOW+';opacity:1;height:'+colH(v)+'px'; }
  if(n) n.textContent=v;
  if(activeBtn)   reapply();
  if(activeRange) doRange(false);
}
function handleColTouch(e,track,idx){ setColVal(idx,valFromY(e.touches[0].clientY,track.getBoundingClientRect())); }
function handleColMouse(e,track,idx){ colDragIdx=idx; setColVal(idx,valFromY(e.clientY,track.getBoundingClientRect())); }
document.addEventListener('mouseup',()=>{colDragIdx=null;});

stage.addEventListener('touchend',e=>{
  const t=e.target.closest('.col-track');
  if(t){const idx=parseInt(t.dataset.colidx);setColVal(idx,flaskLevel);setInfo('Column '+labels[idx]+' set to '+flaskLevel);}
},{passive:true});
stage.addEventListener('click',e=>{
  const t=e.target.closest('.col-track');
  if(t){const idx=parseInt(t.dataset.colidx);setColVal(idx,flaskLevel);setInfo('Column '+labels[idx]+' set to '+flaskLevel);}
});

// ── flask ───────────────────────────────────────────────────────────────────
function applyFlaskLevel(clientY){
  const r=flaskSvg.getBoundingClientRect();
  flaskLevel=Math.max(0,Math.min(MAX,Math.round(MAX*(1-(clientY-r.top)/r.height))));
  const h=240*flaskLevel/MAX;
  flaskLiq.setAttribute('y',240-h); flaskLiq.setAttribute('height',h);
  document.getElementById('flask-val').textContent=flaskLevel;
  setInfo('Tap a column to fill it to level '+flaskLevel);
}
flaskSvg.addEventListener('touchstart',e=>{e.preventDefault();flaskActive=true;applyFlaskLevel(e.touches[0].clientY);},{passive:false});
flaskSvg.addEventListener('touchmove', e=>{e.preventDefault();if(flaskActive)applyFlaskLevel(e.touches[0].clientY);},{passive:false});
document.addEventListener('touchend',()=>{flaskActive=false;});
flaskSvg.addEventListener('mousedown',e=>{flaskActive=true;applyFlaskLevel(e.clientY);});
document.addEventListener('mousemove',e=>{if(flaskActive)applyFlaskLevel(e.clientY);});
document.addEventListener('mouseup',  ()=>{flaskActive=false;});

// ── helpers ─────────────────────────────────────────────────────────────────
function setInfo(msg){info.style.color='#c8c8c8';info.textContent=msg;}

function setPositions(order,animate){
  order.forEach((origIdx,pos)=>{
    const w=document.getElementById('wrap-'+origIdx);
    if(!w) return;
    w.style.transition=animate?'left 1.1s cubic-bezier(0.4,0,0.2,1)':'none';
    w.style.left=(pos*GAP)+'px';
  });
}

function resetAllFills(){
  for(let i=0;i<COLS;i++){
    const f=document.getElementById('fill-'+i);
    if(f) f.style.cssText='background:'+YELLOW+';opacity:1;height:'+colH(vals[i])+'px';
  }
}

function resetBtns(){
  ['btn-mode','btn-median','btn-mean'].forEach(id=>{
    const b=document.getElementById(id);
    b.style.background=''; b.style.color=''; b.style.borderColor='';
  });
}

function hideRange(){
  rangePanel.style.opacity='0';
  rangeLineHigh.style.transform='scaleX(0)';
  rangeLineLow.style.transform='scaleX(0)';
  rangeBox.style.opacity='0';
  activeRange=false;
  const b=document.getElementById('btn-range');
  b.style.background=''; b.style.color=''; b.style.borderColor='';
}

function clearAll(){
  origOrder=Array.from({length:COLS},(_,i)=>i);
  buildCols();
  activeBtn=null;
  resetBtns();
  hideRange();
  info.textContent='';
}

function activateBtn(id,bg,col,border){
  resetBtns();
  const b=document.getElementById(id);
  b.style.background=bg; b.style.color=col; b.style.borderColor=border;
}

// ── copy overlay ─────────────────────────────────────────────────────────────
function showCopyOverlay(){
  copyGrid.innerHTML='';
  origOrder.forEach((origIdx, pos)=>{
    const cell=document.createElement('div');
    cell.className='copy-cell';
    const lbl=document.createElement('div');
    lbl.className='copy-cell-label';
    lbl.textContent=labels[origIdx];
    const val=document.createElement('div');
    val.className='copy-cell-val';
    val.textContent=vals[origIdx]+(pos<COLS-1?',':'');
    cell.appendChild(lbl); cell.appendChild(val);
    copyGrid.appendChild(cell);
  });
  // two-step to trigger CSS transition
  copyOverlay.style.display='flex';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    copyOverlay.style.opacity='1';
  }));
  const b=document.getElementById('btn-copy');
  b.style.background='#4a9ef5'; b.style.color='#fff'; b.style.borderColor='#2d7dd2';
  copyVisible=true;
}

function hideCopyOverlay(){
  copyOverlay.style.opacity='0';
  setTimeout(()=>{ copyOverlay.style.display='none'; },400);
  const b=document.getElementById('btn-copy');
  b.style.background=''; b.style.color=''; b.style.borderColor='';
  copyVisible=false;
}

document.getElementById('btn-copy').addEventListener('click',()=>{
  copyVisible ? hideCopyOverlay() : showCopyOverlay();
});

// ── range ────────────────────────────────────────────────────────────────────
function doRange(animate){
  const hi=Math.max(...vals), lo=Math.min(...vals);
  const range=hi-lo;
  const panelRect=rangePanel.getBoundingClientRect();
  const hiFill=document.getElementById('fill-'+vals.indexOf(hi));
  const loFill=document.getElementById('fill-'+vals.indexOf(lo));
  const hiRect=hiFill.getBoundingClientRect();
  const loRect=loFill.getBoundingClientRect();
  const hiLineBottom=panelRect.bottom-hiRect.top;
  const loLineBottom=panelRect.bottom-loRect.top;
  rangeLineHigh.style.bottom=hiLineBottom+'px';
  rangeLineLow.style.bottom=loLineBottom+'px';
  rangeBox.style.bottom=hiLineBottom+'px';
  rangeBox.style.height=Math.max(28,loLineBottom-hiLineBottom)+'px';
  rangeValText.textContent=range;
  rangePanel.style.opacity='1';
  if(animate){
    rangeLineHigh.style.transition='transform 0.6s ease';
    rangeLineLow.style.transition='transform 0.6s ease 0.25s';
    rangeBox.style.transition='opacity 0.5s ease 0.8s';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      rangeLineHigh.style.transform='scaleX(1)';
      rangeLineLow.style.transform='scaleX(1)';
      rangeBox.style.opacity='1';
    }));
  } else {
    rangeLineHigh.style.transition='none';
    rangeLineLow.style.transition='none';
    rangeBox.style.transition='none';
    rangeLineHigh.style.transform='scaleX(1)';
    rangeLineLow.style.transform='scaleX(1)';
    rangeBox.style.opacity='1';
  }
  setInfo('Range = highest ('+hi+') − lowest ('+lo+') = '+range+'. The range measures spread, not a typical value — it is not an average.');
}

document.getElementById('btn-range').addEventListener('click',()=>{
  if(activeRange){hideRange();info.textContent='';return;}
  activeRange=true;
  const b=document.getElementById('btn-range');
  b.style.background='#d63384'; b.style.color='#fff'; b.style.borderColor='#d63384';
  doRange(true);
});

// ── mode ─────────────────────────────────────────────────────────────────────
function doMode(){
  setPositions(origOrder,false);
  resetAllFills();
  const freq={};
  vals.forEach(v=>{freq[v]=(freq[v]||0)+1;});
  const maxF=Math.max(...Object.values(freq));
  const modes=Object.entries(freq).filter(([,f])=>f===maxF).map(([v])=>parseInt(v));
  const colourMap={};
  modes.forEach((m,i)=>{colourMap[m]=MODE_COLOURS[i%MODE_COLOURS.length];});
  for(let i=0;i<COLS;i++){
    const f=document.getElementById('fill-'+i);
    if(!f) continue;
    const isMode=maxF>1&&colourMap.hasOwnProperty(vals[i]);
    if(isMode){
      f.style.cssText='height:'+colH(vals[i])+'px;opacity:1;background:'+colourMap[vals[i]]+';transition:none';
    } else {
      f.style.cssText='height:'+colH(vals[i])+'px;opacity:1;background:'+YELLOW+';transition:none';
      f.getBoundingClientRect();
      f.style.cssText='height:'+colH(vals[i])+'px;opacity:0.35;background:#888;transition:background 1s ease,opacity 1s ease';
    }
  }
  setInfo(maxF===1?'No mode — all values appear once.'
    :modes.length===1?'Mode = '+modes[0]+' (appears '+maxF+' times). Highlighted in yellow.'
    :'Modes = '+modes.join(' & ')+' — each appears '+maxF+' times, shown in different colours.');
}

// ── median ────────────────────────────────────────────────────────────────────
function doMedian(){
  setPositions(origOrder,false);
  resetAllFills();
  const sorted=[...vals.map((v,i)=>({v,i}))].sort((a,b)=>a.v-b.v);
  const sortedOrder=sorted.map(x=>x.i);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    setPositions(sortedOrder,true);
    const mid=Math.floor(COLS/2);
    setTimeout(()=>{
      sortedOrder.forEach((origIdx,pos)=>{
        const f=document.getElementById('fill-'+origIdx);
        if(!f) return;
        if(pos===mid) f.style.cssText='height:'+colH(vals[origIdx])+'px;background:#4a9ef5;opacity:1';
        else          f.style.cssText='height:'+colH(vals[origIdx])+'px;background:#888;opacity:0.35';
      });
      setInfo('Sorted smallest to largest — middle column (position '+(mid+1)+') is the median = '+vals[sortedOrder[mid]]+'.');
    },1200);
  }));
}

// ── mean ──────────────────────────────────────────────────────────────────────
function doMean(){
  setPositions(origOrder,false);
  resetAllFills();
  const mean=vals.reduce((a,b)=>a+b,0)/COLS;
  const mH=colH(mean);
  const order=[...Array(COLS).keys()].sort((a,b)=>Math.abs(vals[b]-mean)-Math.abs(vals[a]-mean));
  order.forEach((idx,rank)=>{
    const f=document.getElementById('fill-'+idx);
    const n=document.getElementById('num-'+idx);
    const delay=rank*80,dur=900+rank*40;
    setTimeout(()=>{
      if(f){f.style.transition='height '+dur+'ms cubic-bezier(0.4,0,0.2,1)';f.style.height=mH+'px';}
      if(n){
        const start=vals[idx],diff=mean-start,steps=30;let step=0;
        const iv=setInterval(()=>{
          step++;
          n.textContent=step===steps?(mean%1===0?mean:mean.toFixed(2)):Math.round(start+diff*step/steps);
          if(step>=steps)clearInterval(iv);
        },dur/steps);
      }
    },delay);
  });
  setInfo('Mean = ('+vals.join('+')+') ÷ '+COLS+' = '+mean.toFixed(2)+'. Liquid flows from taller columns to shorter ones.');
}

// ── wiring ────────────────────────────────────────────────────────────────────
function reapply(){
  if(activeBtn==='btn-mode')        doMode();
  else if(activeBtn==='btn-median') doMedian();
  else if(activeBtn==='btn-mean')   doMean();
}
function toggleBtn(id,action){
  if(activeBtn===id){clearAll();return;}
  activeBtn=id;
  if(id==='btn-mode')        activateBtn(id,'#f5c431','#6b4a00','#c49a10');
  else if(id==='btn-median') activateBtn(id,'#4a9ef5','#fff','#2d7dd2');
  else if(id==='btn-mean')   activateBtn(id,'#4ac97e','#fff','#2a8f57');
  action();
}

document.getElementById('btn-random').addEventListener('click',()=>{
  vals=Array.from({length:COLS},()=>Math.floor(Math.random()*13));
  clearAll(); buildCols(); setInfo('Random values placed!');
});
document.getElementById('btn-mode').addEventListener('click',   ()=>toggleBtn('btn-mode',doMode));
document.getElementById('btn-median').addEventListener('click', ()=>toggleBtn('btn-median',doMedian));
document.getElementById('btn-mean').addEventListener('click',   ()=>toggleBtn('btn-mean',doMean));

window.addEventListener('resize',()=>{buildCols();if(activeBtn)reapply();if(activeRange)doRange(false);});

buildCols();
</script>
</body>
</html>
