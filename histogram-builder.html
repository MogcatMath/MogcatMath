<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Histogram Builder — Frequency Density</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F9FB;
    --grid:#D7E3ED;
    --grid-strong:#B9CBDD;
    --panel:#FFFFFF;
    --ink:#16233F;
    --ink-soft:#5B6B87;
    --teal:#2A8C82;
    --teal-dark:#1F6B63;
    --teal-fill:#E4F3F1;
    --terracotta:#C1502E;
    --terracotta-fill:#FBEAE3;
    --error:#D64550;
    --error-fill:#FCE9EA;
    --radius:10px;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    overflow:hidden;
  }

  /* graph-paper backdrop */
  body{
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .app{
    display:flex;
    height:100vh;
    width:100vw;
  }

  /* ---------- HEADER STRIP (spans full width, thin) ---------- */
  .header{
    position:fixed; top:0; left:0; right:0;
    height:64px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px;
    background:var(--ink);
    color:#F7F9FB;
    z-index:20;
  }
  .header h1{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:600;
    letter-spacing:0.02em;
    margin:0;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .header h1 .unit{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    font-weight:400;
    color:#9FB4CC;
    letter-spacing:0.06em;
    text-transform:uppercase;
  }

  .mode-toggle{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
  }
  .mode-toggle .lbl{
    color:#9FB4CC;
    transition:color .25s ease;
    letter-spacing:0.03em;
  }
  .mode-toggle .lbl.active{ color:#F7F9FB; font-weight:600; }

  .switch{
    position:relative;
    width:52px; height:26px;
    background:#2C3B5C;
    border-radius:20px;
    cursor:pointer;
    border:1px solid #3D4E73;
  }
  .switch .knob{
    position:absolute;
    top:2px; left:2px;
    width:20px; height:20px;
    border-radius:50%;
    background:var(--teal);
    transition:left .25s cubic-bezier(.4,0,.2,1), background .25s ease;
  }
  .switch.naive .knob{
    left:28px;
    background:var(--terracotta);
  }

  /* ---------- MAIN SPLIT ---------- */
  .main{
    display:flex;
    width:100%;
    height:100%;
    padding-top:64px;
  }

  .panel-left{
    width:42%;
    min-width:400px;
    height:100%;
    padding:18px 16px 16px 22px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .panel-right{
    width:58%;
    height:100%;
    padding:18px 22px 16px 16px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--grid-strong);
    border-radius:var(--radius);
    box-shadow: 0 1px 2px rgba(22,35,63,0.04);
  }

  /* ---------- TABLE PANEL ---------- */
  .table-card{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  .table-head-bar{
    padding:12px 16px 10px 16px;
    border-bottom:1px solid var(--grid);
  }
  .table-head-bar .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    color:var(--teal-dark);
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:600;
  }
  .table-head-bar h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:16px;
    margin:3px 0 0 0;
    font-weight:600;
  }

  .table-scroll{
    flex:1;
    overflow-y:auto;
    overflow-x:auto;
    padding: 0 6px;
  }

  table.freq-table{
    width:100%;
    border-collapse:collapse;
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
  }
  table.freq-table thead th{
    position:sticky; top:0;
    background:var(--panel);
    text-align:center;
    font-family:'Inter', sans-serif;
    font-weight:600;
    font-size:16px;
    color:var(--ink-soft);
    text-transform:uppercase;
    letter-spacing:0.04em;
    padding:10px 4px 8px 4px;
    border-bottom:2px solid var(--ink);
    z-index:2;
  }
  table.freq-table td{
    padding:6px 4px;
    text-align:center;
    border-bottom:1px solid var(--grid);
  }
  table.freq-table tbody tr{
    transition:background .2s ease;
  }
  table.freq-table tbody tr.row-error{
    background:var(--error-fill);
  }
  table.freq-table input[type="number"]{
    width:62px;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    padding:6px 2px;
    border:1px solid var(--grid-strong);
    border-radius:5px;
    background:#FCFDFE;
    color:var(--ink);
  }
  table.freq-table input[type="number"]:focus{
    outline:none;
    border-color:var(--teal);
    box-shadow:0 0 0 2px var(--teal-fill);
  }
  table.freq-table .dash{ color:var(--ink-soft); font-weight:600; }
  .computed{
    color:var(--teal-dark);
    font-weight:600;
  }
  .computed.naive-dim{
    color:#B7C2D2;
  }
  .density-active{ color:var(--terracotta); }

  .del-btn{
    width:30px; height:30px;
    border-radius:5px;
    border:1px solid var(--grid-strong);
    background:#FCFDFE;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:16px;
    line-height:1;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    transition:all .15s ease;
  }
  .del-btn:hover{
    background:var(--error-fill);
    border-color:var(--error);
    color:var(--error);
  }

  .table-foot{
    padding:10px 16px 12px 16px;
    border-top:1px solid var(--grid);
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:center;
  }
  .add-btn{
    font-family:'Inter', sans-serif;
    font-size:16px;
    font-weight:600;
    padding:8px 14px;
    border-radius:7px;
    border:1px solid var(--teal);
    background:var(--teal-fill);
    color:var(--teal-dark);
    cursor:pointer;
    transition:all .15s ease;
  }
  .add-btn:hover{ background:var(--teal); color:#fff; }

  .reset-btn{
    font-family:'Inter', sans-serif;
    font-size:16px;
    font-weight:500;
    padding:8px 14px;
    border-radius:7px;
    border:1px solid var(--grid-strong);
    background:transparent;
    color:var(--ink-soft);
    cursor:pointer;
    transition:all .15s ease;
  }
  .reset-btn:hover{ border-color:var(--ink-soft); color:var(--ink); }

  .equal-btn{
    font-family:'Inter', sans-serif;
    font-size:16px;
    font-weight:600;
    padding:8px 14px;
    border-radius:7px;
    border:1px solid var(--terracotta);
    background:var(--terracotta-fill);
    color:var(--terracotta);
    cursor:pointer;
    transition:all .15s ease;
  }
  .equal-btn:hover{ background:var(--terracotta); color:#fff; }

  .error-banner{
    margin:0 16px 10px 16px;
    padding:8px 12px;
    background:var(--error-fill);
    border:1px solid var(--error);
    border-radius:7px;
    font-size:16px;
    color:var(--error);
    font-family:'Inter', sans-serif;
    display:none;
    line-height:1.4;
  }
  .error-banner.show{ display:block; }

  /* ---------- INFO STRIP under table ---------- */
  .info-card{
    margin-top:12px;
    padding:12px 16px;
    font-family:'Inter', sans-serif;
    font-size:16px;
    line-height:1.5;
    color:var(--ink-soft);
  }
  .info-card b{ color:var(--ink); }
  .info-card .formula{
    font-family:'JetBrains Mono', monospace;
    background:var(--teal-fill);
    color:var(--teal-dark);
    padding:1px 6px;
    border-radius:4px;
    font-weight:600;
  }
  .info-card.naive-mode .formula{
    background:var(--terracotta-fill);
    color:var(--terracotta);
  }

  /* ---------- CHART PANEL ---------- */
  .chart-card{
    flex:1;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .chart-head{
    padding:12px 18px 8px 18px;
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  .chart-head .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:600;
    color:var(--teal-dark);
    transition:color .25s ease;
  }
  .chart-head .eyebrow.naive{ color:var(--terracotta); }

  .chart-head h2{
    font-family:'Space Grotesk', sans-serif;
    font-size:16px;
    font-weight:600;
    margin:2px 0 0 0;
    transition:color .25s ease;
  }

  .area-badge{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    padding:4px 10px;
    border-radius:20px;
    font-weight:600;
    background:var(--teal-fill);
    color:var(--teal-dark);
    white-space:nowrap;
  }
  .area-badge.warn{
    background:var(--terracotta-fill);
    color:var(--terracotta);
  }

  .chart-wrap{
    flex:1;
    padding:4px 12px 12px 12px;
    min-height:0;
  }
  svg#histogram{ width:100%; height:100%; display:block; }

  .bar{
    transition: x .35s cubic-bezier(.4,0,.2,1), width .35s cubic-bezier(.4,0,.2,1), y .35s cubic-bezier(.4,0,.2,1), height .35s cubic-bezier(.4,0,.2,1), fill .3s ease;
  }
  .bar-label{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    fill:var(--ink-soft);
    text-anchor:middle;
    transition: x .35s cubic-bezier(.4,0,.2,1), y .35s cubic-bezier(.4,0,.2,1), fill .3s ease;
  }
  .axis-line{ stroke:var(--ink); stroke-width:1.5; }
  .tick-line{ stroke:var(--grid-strong); stroke-width:1; }
  .tick-text{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    fill:var(--ink-soft);
  }
  .axis-title{
    font-family:'Inter', sans-serif;
    font-size:16px;
    font-weight:600;
    fill:var(--ink-soft);
  }
  .class-boundary{
    stroke:var(--grid-strong);
    stroke-width:1;
    stroke-dasharray:2,3;
  }

  /* narrow-width warning tag above a bar */
  .caution-tag{
    font-family:'JetBrains Mono', monospace;
    font-size:16px;
    fill:var(--terracotta);
    text-anchor:middle;
    font-weight:600;
  }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--grid-strong); border-radius:4px; }
  ::-webkit-scrollbar-track{ background:transparent; }

  @media (max-width: 900px){
    .header h1{ font-size:16px; }
    .header h1 .unit{ display:none; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Histogram Builder <span class="unit">Frequency Density</span></h1>
  <div class="mode-toggle">
    <span class="lbl active" id="lblCorrect">DENSITY</span>
    <div class="switch" id="modeSwitch"><div class="knob"></div></div>
    <span class="lbl" id="lblNaive">NAIVE (FREQ)</span>
  </div>
</div>

<div class="app">
  <div class="main">

    <!-- LEFT: FREQUENCY TABLE -->
    <div class="panel-left">
      <div class="card table-card">
        <div class="table-head-bar">
          <div class="eyebrow">Data</div>
          <h2>Frequency table</h2>
        </div>

        <div class="error-banner" id="errorBanner"></div>

        <div class="table-scroll">
          <table class="freq-table">
            <thead>
              <tr>
                <th>Lower</th>
                <th></th>
                <th>Upper</th>
                <th>Freq</th>
                <th>Width</th>
                <th>F. Density</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <div class="table-foot">
          <button class="add-btn" id="addRow">+ Add class</button>
          <button class="equal-btn" id="equalWidths">Make widths equal</button>
          <button class="reset-btn" id="resetData">Reset data</button>
        </div>
      </div>

      <div class="card info-card" id="infoCard">
        <span id="infoText"></span>
      </div>
    </div>

    <!-- RIGHT: HISTOGRAM -->
    <div class="panel-right">
      <div class="card chart-card">
        <div class="chart-head">
          <div>
            <div class="eyebrow" id="chartEyebrow">Correct construction</div>
            <h2 id="chartTitle">Bar height = frequency density</h2>
          </div>
          <div class="area-badge" id="areaBadge">area ∝ frequency</div>
        </div>
        <div class="chart-wrap">
          <svg id="histogram" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid meet"></svg>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
(function(){

  const STARTER_DATA = [
    { lower: 0,  upper: 10, freq: 8  },
    { lower: 10, upper: 15, freq: 12 },
    { lower: 15, upper: 20, freq: 10 },
    { lower: 20, upper: 30, freq: 6  },
    { lower: 30, upper: 50, freq: 4  }
  ];

  let data = JSON.parse(JSON.stringify(STARTER_DATA));
  let naiveMode = false;

  const tableBody   = document.getElementById('tableBody');
  const errorBanner = document.getElementById('errorBanner');
  const infoText     = document.getElementById('infoText');
  const infoCard      = document.getElementById('infoCard');
  const chartEyebrow  = document.getElementById('chartEyebrow');
  const chartTitle    = document.getElementById('chartTitle');
  const areaBadge     = document.getElementById('areaBadge');
  const svg = document.getElementById('histogram');
  const modeSwitch = document.getElementById('modeSwitch');
  const lblCorrect = document.getElementById('lblCorrect');
  const lblNaive = document.getElementById('lblNaive');

  function computeRows(){
    return data.map(d => {
      const width = d.upper - d.lower;
      const density = width > 0 ? d.freq / width : NaN;
      return { ...d, width, density };
    });
  }

  function validate(rows){
    const errors = [];
    const rowFlags = rows.map(()=>false);

    const sorted = [...rows].sort((a,b)=>a.lower-b.lower);

    rows.forEach((r, i) => {
      if (r.upper <= r.lower){
        errors.push(`Class ${i+1}: upper bound must be greater than lower bound.`);
        rowFlags[i] = true;
      }
      if (r.freq < 0){
        errors.push(`Class ${i+1}: frequency can't be negative.`);
        rowFlags[i] = true;
      }
    });

    for (let i=0; i<rows.length; i++){
      for (let j=i+1; j<rows.length; j++){
        const a = rows[i], b = rows[j];
        if (a.upper > b.lower && a.lower < b.upper){
          errors.push(`Classes ${i+1} and ${j+1} overlap.`);
          rowFlags[i] = true; rowFlags[j] = true;
        }
      }
    }

    if (sorted.length > 1){
      for (let i=0; i<sorted.length-1; i++){
        if (Math.abs(sorted[i].upper - sorted[i+1].lower) > 1e-9 && sorted[i].upper < sorted[i+1].lower){
          errors.push(`There's a gap between ${sorted[i].upper} and ${sorted[i+1].lower}.`);
        }
      }
    }

    return { errors, rowFlags };
  }

  function fmt(n){
    if (isNaN(n) || !isFinite(n)) return '—';
    const rounded = Math.round(n*100)/100;
    return rounded.toString();
  }

  function renderTable(){
    const rows = computeRows();
    const { errors, rowFlags } = validate(rows);

    tableBody.innerHTML = '';
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      if (rowFlags[i]) tr.classList.add('row-error');

      tr.innerHTML = `
        <td><input type="number" step="any" value="${r.lower}" data-idx="${i}" data-field="lower"></td>
        <td class="dash">–</td>
        <td><input type="number" step="any" value="${r.upper}" data-idx="${i}" data-field="upper"></td>
        <td><input type="number" step="any" min="0" value="${r.freq}" data-idx="${i}" data-field="freq"></td>
        <td class="computed ${naiveMode ? 'naive-dim' : ''}">${fmt(r.width)}</td>
        <td class="computed ${naiveMode ? '' : 'density-active'}">${fmt(r.density)}</td>
        <td><button class="del-btn" data-idx="${i}" title="Delete class">✕</button></td>
      `;
      tableBody.appendChild(tr);
    });

    if (errors.length){
      errorBanner.classList.add('show');
      errorBanner.innerHTML = '<b>Check your classes:</b> ' + errors.slice(0,3).join(' ');
    } else {
      errorBanner.classList.remove('show');
    }

    tableBody.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', onCellEdit);
    });
    tableBody.querySelectorAll('.del-btn').forEach(btn => {
      btn.addEventListener('click', onDeleteRow);
    });

    updateInfoText(rows, errors);
    return { rows, errors };
  }

  function onCellEdit(e){
    const idx = parseInt(e.target.dataset.idx, 10);
    const field = e.target.dataset.field;
    const val = parseFloat(e.target.value);
    const selStart = e.target.selectionStart;
    const selEnd = e.target.selectionEnd;

    data[idx][field] = isNaN(val) ? 0 : val;

    // Auto-adjust the touching boundary on the adjacent class so columns
    // never overlap or gap: editing a "lower" bound pulls the previous
    // class's "upper" bound to match, and vice versa.
    if (!isNaN(val)){
      if (field === 'lower' && idx > 0){
        data[idx - 1].upper = val;
      } else if (field === 'upper' && idx < data.length - 1){
        data[idx + 1].lower = val;
      }
    }

    const { rows, errors } = renderTable();
    drawChart(rows, errors);

    // Restore focus + cursor position, since the table body is rebuilt.
    const input = tableBody.querySelector(`input[data-idx="${idx}"][data-field="${field}"]`);
    if (input){
      input.focus();
      try { input.setSelectionRange(selStart, selEnd); } catch (err) { /* not all input types support this */ }
    }
  }

  function onDeleteRow(e){
    const idx = parseInt(e.currentTarget.dataset.idx, 10);
    data.splice(idx, 1);
    const { rows, errors } = renderTable();
    drawChart(rows, errors);
  }

  document.getElementById('addRow').addEventListener('click', () => {
    const last = data[data.length - 1];
    const newLower = last ? last.upper : 0;
    const newUpper = newLower + 10;
    data.push({ lower: newLower, upper: newUpper, freq: 5 });
    const { rows, errors } = renderTable();
    drawChart(rows, errors);
  });

  document.getElementById('equalWidths').addEventListener('click', () => {
    if (data.length === 0) return;
    const overallLower = Math.min(...data.map(d => d.lower));
    const overallUpper = Math.max(...data.map(d => d.upper));
    const n = data.length;
    const width = (overallUpper - overallLower) / n;
    data = data.map((d, i) => ({
      lower: Math.round((overallLower + i * width) * 100) / 100,
      upper: Math.round((overallLower + (i + 1) * width) * 100) / 100,
      freq: d.freq
    }));
    const { rows, errors } = renderTable();
    drawChart(rows, errors);
  });

  document.getElementById('resetData').addEventListener('click', () => {
    data = JSON.parse(JSON.stringify(STARTER_DATA));
    const { rows, errors } = renderTable();
    drawChart(rows, errors);
  });

  modeSwitch.addEventListener('click', () => {
    naiveMode = !naiveMode;
    modeSwitch.classList.toggle('naive', naiveMode);
    lblCorrect.classList.toggle('active', !naiveMode);
    lblNaive.classList.toggle('active', naiveMode);
    infoCard.classList.toggle('naive-mode', naiveMode);
    chartEyebrow.textContent = naiveMode ? 'Naive construction' : 'Correct construction';
    chartEyebrow.classList.toggle('naive', naiveMode);
    chartTitle.textContent = naiveMode ? 'Bar height = frequency' : 'Bar height = frequency density';
    const { rows, errors } = renderTable();
    drawChart(rows, errors);
  });

  function updateInfoText(rows, errors){
    const hasUnequalWidths = new Set(rows.map(r => r.width)).size > 1;
    if (naiveMode){
      infoText.innerHTML = `Bars are drawn at height = <span class="formula">frequency</span>. ` +
        (hasUnequalWidths
          ? `Because class widths differ, wider bars look more important than they should — the <b>area</b> of each bar no longer represents its frequency fairly.`
          : `All classes here happen to be the same width, so this looks identical to the correct histogram. Try making the widths unequal to see the difference.`);
    } else {
      infoText.innerHTML = `Bars are drawn at height = <span class="formula">frequency ÷ class width</span>. ` +
        `This keeps <b>area = frequency</b> for every bar, which is what makes a histogram valid even when class widths differ.`;
    }
  }

  // ---------- SVG CHART ----------
  const NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs){
    const e = document.createElementNS(NS, tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function drawChart(rows, errors){
    svg.innerHTML = '';

    const validRows = rows.filter(r => r.upper > r.lower && r.freq >= 0 && isFinite(r.width) && r.width > 0);
    if (validRows.length === 0){
      const msg = el('text', { x: 400, y: 250, 'text-anchor':'middle', class:'axis-title' });
      msg.textContent = 'Add valid classes to see the histogram';
      svg.appendChild(msg);
      areaBadge.textContent = '—';
      return;
    }

    const margin = { top: 20, right: 30, bottom: 56, left: 64 };
    const W = 800, H = 500;
    const plotW = W - margin.left - margin.right;
    const plotH = H - margin.top - margin.bottom;

    const xMin = Math.min(...validRows.map(r => r.lower));
    const xMax = Math.max(...validRows.map(r => r.upper));
    const xRange = xMax - xMin || 1;

    const yVals = validRows.map(r => naiveMode ? r.freq : r.density);
    let yMax = Math.max(...yVals, 0.0001);
    yMax = yMax * 1.2;

    const xScale = (v) => margin.left + ((v - xMin) / xRange) * plotW;
    const yScale = (v) => margin.top + plotH - (v / yMax) * plotH;

    // gridlines (y)
    const numTicks = 5;
    for (let i=0; i<=numTicks; i++){
      const val = (yMax / numTicks) * i;
      const y = yScale(val);
      svg.appendChild(el('line', { x1: margin.left, x2: W - margin.right, y1: y, y2: y, class:'tick-line' }));
      const t = el('text', { x: margin.left - 8, y: y + 4, class:'tick-text', 'text-anchor':'end' });
      t.textContent = fmt(val);
      svg.appendChild(t);
    }

    // bars
    const fillColor = naiveMode ? 'var(--terracotta)' : 'var(--teal)';
    const fillColorFallback = naiveMode ? '#C1502E' : '#2A8C82';

    validRows.forEach((r) => {
      const x1 = xScale(r.lower);
      const x2 = xScale(r.upper);
      const yVal = naiveMode ? r.freq : r.density;
      const y = yScale(yVal);
      const barH = (margin.top + plotH) - y;

      const rect = el('rect', {
        x: x1, y: y,
        width: Math.max(x2 - x1 - 2, 1),
        height: Math.max(barH, 0),
        fill: fillColorFallback,
        opacity: 0.85,
        class: 'bar',
        rx: 2
      });
      svg.appendChild(rect);

      const label = el('text', {
        x: (x1+x2)/2, y: margin.top + plotH + 18,
        class: 'bar-label'
      });
      label.textContent = fmt(r.lower) + '–' + fmt(r.upper);
      svg.appendChild(label);

      // caution tag for wide/narrow bars in naive mode
      if (naiveMode){
        const widths = validRows.map(rr=>rr.width);
        const isOutlierWidth = r.width !== widths[0];
        if (isOutlierWidth){
          const tag = el('text', { x:(x1+x2)/2, y: y - 8, class:'caution-tag' });
          tag.textContent = 'width ' + fmt(r.width);
          svg.appendChild(tag);
        }
      }

      // class boundary dashed lines
      svg.appendChild(el('line', {
        x1: x1, x2: x1, y1: margin.top, y2: margin.top + plotH, class:'class-boundary'
      }));
    });
    // final boundary line
    const lastX = xScale(validRows[validRows.length-1].upper);
    svg.appendChild(el('line', { x1:lastX, x2:lastX, y1:margin.top, y2:margin.top+plotH, class:'class-boundary' }));

    // axes
    svg.appendChild(el('line', { x1:margin.left, x2:W-margin.right, y1:margin.top+plotH, y2:margin.top+plotH, class:'axis-line' }));
    svg.appendChild(el('line', { x1:margin.left, x2:margin.left, y1:margin.top, y2:margin.top+plotH, class:'axis-line' }));

    const xTitle = el('text', { x: margin.left + plotW/2, y: H - 10, 'text-anchor':'middle', class:'axis-title' });
    xTitle.textContent = 'Value';
    svg.appendChild(xTitle);

    const yTitle = el('text', {
      x: -(margin.top + plotH/2), y: 18,
      'text-anchor':'middle', class:'axis-title',
      transform: 'rotate(-90)'
    });
    yTitle.textContent = naiveMode ? 'Frequency' : 'Frequency density';
    svg.appendChild(yTitle);

    // area badge
    if (naiveMode){
      const widths = new Set(validRows.map(r=>r.width));
      areaBadge.textContent = widths.size > 1 ? 'area ≠ frequency' : 'area ∝ frequency';
      areaBadge.classList.toggle('warn', widths.size > 1);
    } else {
      areaBadge.textContent = 'area ∝ frequency';
      areaBadge.classList.remove('warn');
    }
  }

  // init
  const initial = renderTable();
  drawChart(initial.rows, initial.errors);

})();
</script>
</body>
</html>
