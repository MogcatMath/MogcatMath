<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Circle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a1a;
    color: #e5e5e3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .app {
    background: #242424;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 20px 22px;
    width: 100%;
    max-width: 820px;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.18);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.75); }
  .btn.active {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.35);
    color: #fff;
  }
  .divider { width:1px; background:rgba(255,255,255,0.12); height:24px; margin:0 2px; }
  .stats { display: flex; gap: 20px; margin-left: auto; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 2px; }
  .stat-val { font-size: 15px; font-weight: 600; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .panel {
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 10px;
    overflow: hidden;
  }
  #table-wrap {
    display: none;
    margin-top: 12px;
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px;
    overflow: auto;
    max-height: 280px;
  }
  #table-wrap.open { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { position: sticky; top: 0; background: #2a2a2a; z-index: 1; }
  th { padding: 8px 12px; text-align: right; color: rgba(255,255,255,0.4); font-weight: 500; letter-spacing: 0.04em; border-bottom: 1px solid rgba(255,255,255,0.08); }
  th:first-child { text-align: left; }
  td { padding: 5px 12px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.04); font-variant-numeric: tabular-nums; }
  td:first-child { text-align: left; color: rgba(255,255,255,0.5); }
  tr.highlight td { background: rgba(255,255,255,0.06); }
  tr:last-child td { border-bottom: none; }
  canvas { display: block; width: 100%; }
  #circle-canvas { cursor: grab; }
  #circle-canvas:active { cursor: grabbing; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <button class="btn active" id="btn-sin"  onclick="setMode('sin')">Sin</button>
    <button class="btn"        id="btn-cos"  onclick="setMode('cos')">Cos</button>
    <button class="btn"        id="btn-tan"  onclick="setMode('tan')">Tan</button>
    <button class="btn"        id="btn-both" onclick="setMode('both')">Sin+Cos</button>
    <button class="btn"        id="btn-all"  onclick="setMode('all')">All</button>
    <div class="divider"></div>
    <button class="btn" id="btn-table" onclick="toggleTable()">Values</button>
    <div class="divider"></div>
    <button class="btn active" id="btn-step-01" onclick="setStep(0.1)">0.1°</button>
    <button class="btn"        id="btn-step-1"  onclick="setStep(1)">1°</button>
    <div class="stats">
      <div class="stat"><div class="stat-label">Angle</div><div class="stat-val" id="stat-angle" style="color:#e5e5e3;">30.0°</div></div>
      <div class="stat"><div class="stat-label">Sin</div><div class="stat-val" id="stat-sin" style="color:#4a9fd4;">0.500</div></div>
      <div class="stat"><div class="stat-label">Cos</div><div class="stat-val" id="stat-cos" style="color:#e07b3a;">0.866</div></div>
      <div class="stat"><div class="stat-label">Tan</div><div class="stat-val" id="stat-tan" style="color:#a78bfa;">0.577</div></div>
    </div>
  </div>
  <div class="panels">
    <div class="panel"><canvas id="circle-canvas" width="340" height="340"></canvas></div>
    <div class="panel"><canvas id="graph-canvas"  width="340" height="340"></canvas></div>
  </div>
  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Angle</th>
          <th id="th-sin" style="color:#4a9fd4;">Sin</th>
          <th id="th-cos" style="color:#e07b3a;">Cos</th>
          <th id="th-tan" style="color:#a78bfa;">Tan</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<script>
let angle = 30 * Math.PI / 180, mode = 'sin', dragging = false, step = 0.1;
const cc = document.getElementById('circle-canvas');
const gc = document.getElementById('graph-canvas');
const cCtx = cc.getContext('2d');
const gCtx = gc.getContext('2d');

const SIN  = '#4a9fd4', COS = '#e07b3a', TAN = '#a78bfa', BG = '#1e1e1e';
const CIRC = 'rgba(255,255,255,0.45)', AXES = 'rgba(255,255,255,0.15)';
const GRID = 'rgba(255,255,255,0.07)', LBL  = 'rgba(255,255,255,0.35)';
const TXT  = 'rgba(255,255,255,0.85)', ARC  = 'rgba(255,255,255,0.22)';

function showSin() { return mode==='sin'||mode==='both'||mode==='all'; }
function showCos() { return mode==='cos'||mode==='both'||mode==='all'; }
function showTan() { return mode==='tan'||mode==='all'; }

function drawCircle() {
  const W = cc.width, H = cc.height, cx = W/2, cy = H/2, R = W*0.37;
  cCtx.clearRect(0,0,W,H);

  /* axes */
  cCtx.strokeStyle = AXES; cCtx.lineWidth = 1; cCtx.setLineDash([]);
  cCtx.beginPath(); cCtx.moveTo(12,cy); cCtx.lineTo(W-12,cy); cCtx.stroke();
  cCtx.beginPath(); cCtx.moveTo(cx,12); cCtx.lineTo(cx,H-12); cCtx.stroke();

  /* degree labels */
  cCtx.fillStyle = LBL; cCtx.font = '11px sans-serif'; cCtx.textBaseline = 'middle';
  [[0,'0°'],[90,'90°'],[180,'180°'],[270,'270°']].forEach(([d,lbl]) => {
    const r = d*Math.PI/180;
    cCtx.textAlign = 'center';
    cCtx.fillText(lbl, cx+(R+18)*Math.cos(r), cy-(R+18)*Math.sin(r));
  });

  /* unit circle */
  cCtx.strokeStyle = CIRC; cCtx.lineWidth = 1.5;
  cCtx.beginPath(); cCtx.arc(cx,cy,R,0,2*Math.PI); cCtx.stroke();

  /* 30/45/60 reference lines */
  [30,45,60].forEach(d => {
    const r = d*Math.PI/180;
    const ex = cx+R*Math.cos(r), ey = cy-R*Math.sin(r);
    cCtx.strokeStyle = 'rgba(255,255,255,0.22)'; cCtx.lineWidth = 1; cCtx.setLineDash([4,4]);
    cCtx.beginPath(); cCtx.moveTo(ex,cy); cCtx.lineTo(ex,ey); cCtx.stroke();
    cCtx.setLineDash([]);
    cCtx.fillStyle = 'rgba(255,255,255,0.3)'; cCtx.font = '10px sans-serif';
    cCtx.textAlign = 'center'; cCtx.textBaseline = 'top';
    cCtx.fillText(d+'°', ex, cy+5);
  });

  const px = cx+R*Math.cos(angle), py = cy-R*Math.sin(angle);
  const sv = Math.sin(angle), cv = Math.cos(angle);
  const tv = Math.tan(angle);
  const tanClamped = Math.abs(tv) > 10;

  /* tan line: vertical tangent on right side of circle from (cx+R, cy) */
  if (showTan() && !tanClamped) {
    const tx = cx + R; // tangent line x (right side of circle)
    const tanY = cy - tv * R; // where the extended radius hits the tangent line
    /* line from point on circle extended to tangent line */
    cCtx.strokeStyle = TAN+'99'; cCtx.lineWidth = 1.5; cCtx.setLineDash([5,4]);
    cCtx.beginPath(); cCtx.moveTo(px,py); cCtx.lineTo(tx,tanY); cCtx.stroke();
    cCtx.setLineDash([]);
    /* vertical tangent segment */
    cCtx.strokeStyle = TAN; cCtx.lineWidth = 2.5;
    cCtx.beginPath(); cCtx.moveTo(tx,cy); cCtx.lineTo(tx,tanY); cCtx.stroke();
    /* dot */
    cCtx.fillStyle = TAN;
    cCtx.beginPath(); cCtx.arc(tx,tanY,4,0,2*Math.PI); cCtx.fill();
    /* label */
    cCtx.fillStyle = TAN; cCtx.font = '12px sans-serif';
    cCtx.textAlign = tv>=0?'right':'right'; cCtx.textBaseline = 'middle';
    cCtx.fillText(`tan = ${tv.toFixed(3)}`, tx-8, (cy+tanY)/2);
  }

  /* dashed projections */
  cCtx.setLineDash([5,4]); cCtx.lineWidth = 1.5;
  if (showSin()) { cCtx.strokeStyle=SIN+'88'; cCtx.beginPath(); cCtx.moveTo(px,cy); cCtx.lineTo(px,py); cCtx.stroke(); }
  if (showCos()) { cCtx.strokeStyle=COS+'88'; cCtx.beginPath(); cCtx.moveTo(cx,py); cCtx.lineTo(px,py); cCtx.stroke(); }
  cCtx.setLineDash([]);

  /* solid projection arms */
  cCtx.lineWidth = 2.5;
  if (showSin()) { cCtx.strokeStyle=SIN; cCtx.beginPath(); cCtx.moveTo(px,cy); cCtx.lineTo(px,cy-sv*R); cCtx.stroke(); }
  if (showCos()) { cCtx.strokeStyle=COS; cCtx.beginPath(); cCtx.moveTo(cx,py); cCtx.lineTo(cx+cv*R,py); cCtx.stroke(); }

  /* angle arc */
  cCtx.strokeStyle = ARC; cCtx.lineWidth = 1.5;
  cCtx.beginPath(); cCtx.arc(cx,cy,R*0.21,0,-angle,angle<0); cCtx.stroke();

  /* radius */
  cCtx.strokeStyle = 'rgba(255,255,255,0.75)'; cCtx.lineWidth = 2;
  cCtx.beginPath(); cCtx.moveTo(cx,cy); cCtx.lineTo(px,py); cCtx.stroke();

  /* endpoint dots */
  if (showCos()) { cCtx.fillStyle=COS; cCtx.beginPath(); cCtx.arc(cx+cv*R,cy,5,0,2*Math.PI); cCtx.fill(); }
  if (showSin()) { cCtx.fillStyle=SIN; cCtx.beginPath(); cCtx.arc(cx,cy-sv*R,5,0,2*Math.PI); cCtx.fill(); }

  /* draggable point */
  cCtx.fillStyle='#fff'; cCtx.strokeStyle=BG; cCtx.lineWidth=2;
  cCtx.beginPath(); cCtx.arc(px,py,8,0,2*Math.PI); cCtx.fill(); cCtx.stroke();

  /* value labels */
  cCtx.font='12px sans-serif'; cCtx.textBaseline='middle';
  if (showSin()) {
    cCtx.fillStyle=SIN; cCtx.textAlign=cv>=0?'left':'right';
    cCtx.fillText(`sin = ${sv.toFixed(3)}`, px+(cv>=0?10:-10), cy-sv*R/2);
  }
  if (showCos()) {
    cCtx.fillStyle=COS; cCtx.textAlign='center';
    cCtx.fillText(`cos = ${cv.toFixed(3)}`, cx+cv*R/2, py-10);
  }
}

function drawGraph() {
  const W = gc.width, H = gc.height;
  const pL=44, pR=16, pT=28, pB=36;
  const gW=W-pL-pR, gH=H-pT-pB;
  gCtx.clearRect(0,0,W,H);

  const isTanMode = showTan();
  const yRange = isTanMode ? 4 : 1; // ±4 for tan, ±1 for sin/cos

  /* horizontal grid + y labels */
  const yTicks = isTanMode ? [-4,-3,-2,-1,0,1,2,3,4] : [-1,-0.5,0,0.5,1];
  yTicks.forEach(v => {
    const y = pT + gH/2 - (v/yRange)*gH/2;
    gCtx.strokeStyle=GRID; gCtx.lineWidth=1; gCtx.setLineDash([]);
    gCtx.beginPath(); gCtx.moveTo(pL,y); gCtx.lineTo(pL+gW,y); gCtx.stroke();
    gCtx.fillStyle=LBL; gCtx.font='10px sans-serif';
    gCtx.textAlign='right'; gCtx.textBaseline='middle';
    gCtx.fillText(v, pL-5, y);
  });

  /* vertical grid + x labels */
  [0,90,180,270,360].forEach(d => {
    const x = pL+(d/360)*gW;
    gCtx.strokeStyle=GRID; gCtx.lineWidth=1;
    gCtx.beginPath(); gCtx.moveTo(x,pT); gCtx.lineTo(x,pT+gH); gCtx.stroke();
    gCtx.fillStyle=LBL; gCtx.font='10px sans-serif';
    gCtx.textAlign='center'; gCtx.textBaseline='top';
    gCtx.fillText(d+'°', x, pT+gH+5);
  });

  /* mid axis */
  const midY = pT+gH/2;
  gCtx.strokeStyle=AXES; gCtx.lineWidth=1;
  gCtx.beginPath(); gCtx.moveTo(pL,midY); gCtx.lineTo(pL+gW,midY); gCtx.stroke();

  const toY = v => pT + gH/2 - (v/yRange)*gH/2;

  const drawCurve = (fn, color, dash, clamp) => {
    gCtx.strokeStyle=color; gCtx.lineWidth=2; gCtx.setLineDash(dash||[]);
    gCtx.beginPath(); let started=false, penUp=false;
    for (let i=0; i<=360; i++) {
      const r=i*Math.PI/180, v=fn(r);
      if (clamp && Math.abs(v)>clamp) { penUp=true; continue; }
      const x=pL+(i/360)*gW, y=toY(Math.max(-yRange*1.1, Math.min(yRange*1.1, v)));
      if (!started||penUp) { gCtx.moveTo(x,y); started=true; penUp=false; }
      else gCtx.lineTo(x,y);
    }
    gCtx.stroke(); gCtx.setLineDash([]);
  };

  const drawTracker = (fn, color, clamp) => {
    const deg=((angle*180/Math.PI)%360+360)%360;
    const val=fn(angle);
    if (clamp && Math.abs(val)>clamp) return;
    const tx=pL+(deg/360)*gW, ty=toY(val);
    gCtx.strokeStyle=color+'66'; gCtx.lineWidth=1; gCtx.setLineDash([4,3]);
    gCtx.beginPath(); gCtx.moveTo(tx,pT); gCtx.lineTo(tx,pT+gH); gCtx.stroke();
    gCtx.setLineDash([]);
    gCtx.fillStyle=color; gCtx.strokeStyle=BG; gCtx.lineWidth=2.5;
    gCtx.beginPath(); gCtx.arc(tx,ty,6,0,2*Math.PI); gCtx.fill(); gCtx.stroke();
  };

  if (showCos()) { drawCurve(Math.cos, COS, [6,3]); drawTracker(Math.cos, COS); }
  if (showSin()) { drawCurve(Math.sin, SIN); drawTracker(Math.sin, SIN); }
  if (showTan()) { drawCurve(Math.tan, TAN, [], 3.9); drawTracker(Math.tan, TAN, 3.9); }

  /* title */
  const labels = [];
  if (showSin()) labels.push('sin'); if (showCos()) labels.push('cos'); if (showTan()) labels.push('tan');
  gCtx.fillStyle=TXT; gCtx.font='12px sans-serif';
  gCtx.textAlign='center'; gCtx.textBaseline='bottom';
  gCtx.fillText(labels.join(' & ')+' graph', pL+gW/2, pT-4);

  /* legend if multiple */
  if (labels.length > 1) {
    const entries = [];
    if (showSin()) entries.push([SIN,'sin',[]]);
    if (showCos()) entries.push([COS,'cos',[5,2]]);
    if (showTan()) entries.push([TAN,'tan',[3,2]]);
    const lx = pL+gW-6;
    entries.forEach(([col,lb,dash],i) => {
      const ly = pT+8+i*18;
      gCtx.strokeStyle=col; gCtx.lineWidth=2; gCtx.setLineDash(dash);
      gCtx.beginPath(); gCtx.moveTo(lx-26,ly); gCtx.lineTo(lx-10,ly); gCtx.stroke();
      gCtx.setLineDash([]);
      gCtx.fillStyle=col; gCtx.font='10px sans-serif';
      gCtx.textAlign='left'; gCtx.textBaseline='middle';
      gCtx.fillText(lb, lx-7, ly);
    });
  }
}

function updateStats() {
  const deg=((angle*180/Math.PI)%360+360)%360;
  const tv=Math.tan(angle);
  document.getElementById('stat-angle').textContent = deg.toFixed(1)+'°';
  document.getElementById('stat-sin').textContent   = Math.sin(angle).toFixed(3);
  document.getElementById('stat-cos').textContent   = Math.cos(angle).toFixed(3);
  document.getElementById('stat-tan').textContent   = Math.abs(tv)>99 ? '∞' : tv.toFixed(3);
}

let tableOpen = false;

function toggleTable() {
  tableOpen = !tableOpen;
  document.getElementById('table-wrap').classList.toggle('open', tableOpen);
  document.getElementById('btn-table').classList.toggle('active', tableOpen);
  if (tableOpen) buildTable();
}

function buildTable() {
  const body = document.getElementById('table-body');
  const curDeg = ((angle*180/Math.PI)%360+360)%360;
  const hasSin = showSin(), hasCos = showCos(), hasTan = showTan();

  document.getElementById('th-sin').style.display = hasSin ? '' : 'none';
  document.getElementById('th-cos').style.display = hasCos ? '' : 'none';
  document.getElementById('th-tan').style.display = hasTan ? '' : 'none';

  const sv = Math.sin(angle), cv = Math.cos(angle), tv = Math.tan(angle);
  const TOL = 0.0001;

  // Find all angles 0-360 (step resolution) that share the same value for any active ratio
  const matches = [];
  for (let d = 0; d <= 360; d += step) {
    const r = d * Math.PI / 180;
    const matchSin = hasSin && Math.abs(Math.sin(r) - sv) < TOL;
    const matchCos = hasCos && Math.abs(Math.cos(r) - cv) < TOL;
    const matchTan = hasTan && Math.abs(tv) < 999 && Math.abs(Math.tan(r) - tv) < TOL;
    if (matchSin || matchCos || matchTan) {
      matches.push({ d, r, matchSin, matchCos, matchTan });
    }
  }

  if (matches.length === 0) {
    body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:rgba(255,255,255,0.3);padding:16px;">No matching angles found</td></tr>';
    return;
  }

  const rows = matches.map(({ d, r, matchSin, matchCos, matchTan }) => {
    const isCurrent = Math.abs(d - curDeg) < step * 0.5;
    let row = `<tr${isCurrent ? ' class="highlight"' : ''}>`;
    row += `<td>${d.toFixed(step < 1 ? 1 : 0)}°</td>`;
    if (hasSin) row += `<td style="color:${matchSin?'#4a9fd4':'rgba(255,255,255,0.2)'}">${Math.sin(r).toFixed(4)}</td>`;
    if (hasCos) row += `<td style="color:${matchCos?'#e07b3a':'rgba(255,255,255,0.2)'}">${Math.cos(r).toFixed(4)}</td>`;
    if (hasTan) row += `<td style="color:${matchTan?'#a78bfa':'rgba(255,255,255,0.2)'}">${Math.abs(Math.tan(r))>999?'∞':Math.tan(r).toFixed(4)}</td>`;
    row += '</tr>';
    return row;
  });

  body.innerHTML = rows.join('');
}

function render() { drawCircle(); drawGraph(); updateStats(); if (tableOpen) buildTable(); }

function setMode(m) {
  mode=m;
  ['sin','cos','tan','both','all'].forEach(id =>
    document.getElementById('btn-'+id).classList.toggle('active', id===m));
  render();
}

function setStep(s) {
  step=s;
  ['01','1'].forEach(id =>
    document.getElementById('btn-step-'+id).classList.toggle('active',(id==='01'?0.1:1)===s));
}

function getAngle(e) {
  const rect=cc.getBoundingClientRect();
  const sx=cc.width/rect.width, sy=cc.height/rect.height;
  const t=e.touches?e.touches[0]:e;
  const raw=Math.atan2(-((t.clientY-rect.top)*sy-cc.height/2),(t.clientX-rect.left)*sx-cc.width/2);
  const deg=raw*180/Math.PI;
  return Math.round(deg/step)*step*Math.PI/180;
}

cc.addEventListener('mousedown',  e => { dragging=true; angle=getAngle(e); render(); });
cc.addEventListener('mousemove',  e => { if(dragging){angle=getAngle(e); render();} });
cc.addEventListener('mouseup',    () => dragging=false);
cc.addEventListener('mouseleave', () => dragging=false);
cc.addEventListener('touchstart', e => { e.preventDefault(); dragging=true; angle=getAngle(e); render(); },{passive:false});
cc.addEventListener('touchmove',  e => { e.preventDefault(); if(dragging){angle=getAngle(e); render();} },{passive:false});
cc.addEventListener('touchend',   () => dragging=false);

render();
</script>
</body>
</html>
